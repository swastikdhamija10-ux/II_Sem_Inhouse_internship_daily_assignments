<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5 mb-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3 class="text-center">Student Registration Form</h3>

</div>

<div class="card-body">

<div id="errorBox"></div>

<form action="index.php" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" name="name" id="name" class="form-control" required placeholder="Enter your full name">
</div>

<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="text" name="phone" class="form-control" required placeholder="Enter your number">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required placeholder="Enter your Email">
</div>

<div class="col-md-6 mb-3">
<label>Birth Date</label>
<input type="date" name="dob" class="form-control" required >
</div>

<div class="col-md-6 mb-3">
<label>Country</label>

<select name="country" class="form-select">

<option>India</option>
<option>USA</option>
<option>Canada</option>
<option>Australia</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Course</label>

<select name="course" class="form-select">

<option>B.Tech CSE</option>
<option>B.Tech DS</option>
<option>BCA</option>
<option>MCA</option>

</select>

</div>

<div class="col-12 mb-3">

<label>Address</label>

<textarea name="address" id="address" rows="3" class="form-control"></textarea>

</div>

<div class="col-md-6 mb-3">

<label>Gender</label><br>

<input type="radio" name="gender" value="Male"> Male

<input type="radio" name="gender" value="Female"> Female

<input type="radio" name="gender" value="Other"> Other

</div>

<div class="col-md-6 mb-3">

<label>Profile Photo</label>

<input type="file" id="photo" class="form-control">

<small id="photoName">No file selected</small>

</div>

</div>

<div class="text-center">

<button class="btn btn-success px-4">Register</button>

</div>

</form>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
